<body>
  <header>
    <h1>AgroTech Monitor</h1>
    <nav>
      <ul>
        <li><a href="#frota">Frota</a></li>
        <li><a href="#manutencao">Manutenção</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="frota">
      <h2>Monitoramento de Colhedoras</h2>
      <p>Máquina: <strong>{{ info.maquina }}</strong></p>
      <p>Horas de Uso: <strong>{{ info.horas_uso }}h</strong></p>
      <p>
        Status Atual:
        <span
          class="{% if info.status == 'Operacional' %}status-operacional{% else %}status-alerta{% endif %}"
        >
          {{ info.status }}
        </span>
      </p>
      <table>
        <thead>
          <tr>
            <th>Equipamento</th>
            <th>Horas de Uso</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {% for m in maquinas %}
          <tr>
            <td>{{ m.modelo }}</td>
            <td>{{ m.horas }}h</td>
            <td>
              <span
                class="{% if m.status == 'Operacional' %}status-operacional{% else %}status-alerta{% endif %}"
              >
                {{ m.status }}
              </span>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroTech Monitor - Gestão de Frota</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <h1>AgroTech Monitor</h1>
      <nav>
        <ul>
          <li><a href="#frota">Painel de Frota</a></li>
          <li><a href="#manutencao">Relatórios</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="frota">
        <h2>Monitoramento de Colhedoras e Tratores</h2>
        <p>Status do Sistema: <strong>Conectado às Máquinas</strong></p>

        <table>
          <thead>
            <tr>
              <th>Equipamento</th>
              <th>Horas de Uso</th>
              <th>Status de Manutenção</th>
            </tr>
          </thead>
          <tbody>
            {% for m in maquinas %}
            <tr>
              <td>{{ m.modelo }}</td>
              <td>{{ m.horas }}h</td>
              <td>
                <span
                  class="{% if m.status == 'Operacional' %}status-operacional{% else %}status-alerta{% endif %}"
                >
                  {{ m.status }}
                </span>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>

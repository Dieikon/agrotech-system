<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatórios - AgroTech</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        background-color: #0f1115;
        color: #e5e7eb;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Cabeçalho */
      .header-bg {
        background-color: #1f2229;
        border-bottom: 1px solid #2d313a;
        padding: 25px 0;
        text-align: center;
      }
      .text-accent {
        color: #f59e0b;
      }

      .header-links a {
        color: #9ca3af;
        margin: 0 15px;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }
      .header-links a:hover {
        color: #f59e0b;
      }
      .header-links a.active {
        color: #f59e0b;
        border-bottom: 2px solid #f59e0b;
        padding-bottom: 5px;
      }

      /* Cartões Analíticos */
      .card-dark {
        background-color: #1f2229;
        border: 1px solid #2d313a;
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
      }

      .card-title-custom {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #9ca3af;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .metric-value {
        font-size: 3.5rem;
        font-weight: 700;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div class="header-bg mb-5 shadow-sm">
      <h2 class="fw-bold mb-3">
        <i class="fa-solid fa-chart-pie text-accent me-2"></i>AgroTech Monitor
      </h2>
      <div class="header-links">
        <a href="/">Painel de Frota</a>
        <a href="/relatorio" class="active">Relatórios</a>
      </div>
    </div>

    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-white">Performance da Frota</h4>
        <a href="/" class="btn btn-outline-secondary"
          ><i class="fa-solid fa-arrow-left me-2"></i>Voltar</a
        >
      </div>

      <div class="row g-4 mt-2">
        <div class="col-md-4">
          <div class="card-dark h-100">
            <div class="card-title-custom">
              <i class="fa-solid fa-tractor me-2"></i>Total de Equipamentos
            </div>
            <div class="metric-value text-white mt-3">{{ total }}</div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-dark h-100" style="border-bottom: 4px solid #ef4444">
            <div class="card-title-custom">
              <i class="fa-solid fa-triangle-exclamation me-2"></i>Em Alerta
            </div>
            <div class="metric-value mt-3" style="color: #ef4444">
              {{ alerta }}
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card-dark h-100" style="border-bottom: 4px solid #10b981">
            <div class="card-title-custom">
              <i class="fa-solid fa-check-circle me-2"></i>Disponibilidade
            </div>
            <div class="metric-value mt-3" style="color: #10b981">
              {{ disponibilidade }}<span style="font-size: 1.5rem">%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

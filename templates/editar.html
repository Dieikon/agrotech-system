<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Máquina - AgroTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #0f1115; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        
        .header-bg { 
            background-color: #1f2229; 
            border-bottom: 1px solid #2d313a;
            padding: 25px 0; 
            text-align: center; 
        }
        .text-accent { color: #f59e0b; }
        
        .card-dark { background-color: #1f2229; border: 1px solid #2d313a; border-radius: 12px; }

        /* Estilos dos Inputs Escuros */
        .form-control, .form-select {
            background-color: #0f1115; border: 1px solid #374151; color: #e5e7eb;
        }
        .form-control:focus, .form-select:focus {
            background-color: #1a1d24; border-color: #f59e0b; color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(245, 158, 11, 0.25);
        }
        option { background-color: #0f1115; color: #e5e7eb; }
        
        .btn-salvar { background-color: #f59e0b; color: #000; font-weight: 600; border: none; }
        .btn-salvar:hover { background-color: #d97706; color: #000; }
    </style>
</head>
<body>
    
    <div class="header-bg mb-5 shadow-sm">
        <h2 class="fw-bold mb-0"><i class="fa-solid fa-tractor text-accent me-2"></i>AgroTech Monitor</h2>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-dark shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold mb-4 text-white"><i class="fa-solid fa-pen-to-square text-accent me-2"></i>Editar Máquina</h4>
                        
                        <form action="/editar/{{ id }}" method="POST">
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold">Modelo do Equipamento</label>
                                <input type="text" name="modelo" class="form-control py-2" value="{{ maquina['modelo'] }}" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-semibold">Nº da Frota</label>
                                <input type="text" name="numero_frota" class="form-control py-2" value="{{ maquina['numero_frota'] }}" required>
                            </div>

                            <div class="mb-5">
                                <label class="form-label text-muted small fw-semibold">Operador Responsável</label>
                                <select name="operador_id" class="form-select py-2" required>
                                    <option value="" disabled>Selecione um operador...</option>
                                    {% for op in operadores %}
                                        <option value="{{ op['id'] }}" {% if maquina['operador_id'] == op['id'] %}selected{% endif %}>
                                            {{ op['nome'] }} - {{ op['telefone'] }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/" class="btn btn-outline-secondary px-4 py-2 fw-semibold">Cancelar</a>
                                <button type="submit" class="btn btn-salvar px-4 py-2"><i class="fa-solid fa-check me-2"></i>Salvar Alterações</button>
                            </div>
                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
